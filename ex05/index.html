<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alinhamento vertical</title>
    <style>
     #container{
        height: 96vh;
        padding: 10px;
        background-color: purple;
         background-size: 100% 100%;
     }
     #conteudo{
        /* Ao colocar posição absoluto, permite configurar duas propriedades left e right. */
        position: absolute;
        height: 200px;
        width: 400px;
        background-color: yellow;
       
        /* left é a distancia lateral 
        top distância da parte de cima */
        left: 50%;
        top: 50%;
        /* para centralizar, precisa utilar a aplicação transformação */
        transform:translate(-50% , -50%) ;
     }



    </style>
</head>
<body>
    <section id="container">
       <article id="conteudo">

       </article>
    </section>
</body>
</html>
