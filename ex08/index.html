<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesclagem de células</title>
    <style>

        table{
            width: 500px;
            border-collapse: collapse;
            position: relative;
        }
        td,th{
            border: 1px solid black;
            padding: 10px;
        }
</style>

</head>
<body>
    <table>
        <tr>

          <td rowspan="2">A</td>
          <td colspan="2">B</td>
        
        </tr>
        <tr>
           
           <td>D</td>
           <td>E</td>

        </tr>
    </table>
</body>
</html>
